<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Tech Store</title> 
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
rel="stylesheet"> 
<style> 
body{background-color:#eef2f7; 
font-family:Arial;} 
.navbar{background-color:#6c5ce7;} 
.navbar-brand,.nav-link{color:white !important;} 
.heading{text-align:center; 
padding:40px; 
color:#333;} 
.card{border:none; 
border-radius:15px; 
box-shadow:0 4px 10px rgba(0,0,0,0.1); 
transition:0.3s;} 
.card:hover{transform:translateY(-5px);} 
.card img{ height:220px; 
object-fit:contain; 
padding:15px;} 
.price{font-size:20px; 
font-weight:bold; 
color:#6c5ce7;} 
.footer{background-color:#6c5ce7; 
color:white; 
text-align:center; 
padding:15px; 
margin-top:40px;} 
</style> 
</head> 
<body> 
<nav class="navbar navbar-expand-lg"> 
<div class="container"> 
<a class="navbar-brand" href="#">TechZone</a> 
<ul class="navbar-nav ms-auto"> 
<li class="nav-item"> 
<a class="nav-link" href="#">Home</a> 
</li> 
<li class="nav-item"> 
<a class="nav-link" href="#">Products</a> 
</li> 
<li class="nav-item"> 
<a class="nav-link" href="#">Contact</a> 
</li> 
</ul> 
</div> 
</nav> 
<div class="container"> 
<div class="row g-4"> 
<div class="col-md-4"> 
<div class="card"> 
<img 
src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853" 
class="card-img-top" 
alt="Laptop"> 
<div class="card-body"> 
<h4 class="card-title">Laptop 
<span class="badge bg-success">New</span> 
</h4> 
<p class="card-text"> Powerful laptop for study and work.</p> 
<p class="price">₹55,000</p> 
<button class="btn btn-primary">Buy Now</button> 
</div> 
</div> 
</div> 
<div class="col-md-4"> 
<div class="card"> 
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9" 
class="card-img-top" 
alt="Mobile"> 
<div class="card-body"> 
<h4 class="card-title"> 
Smartphone 
<span class="badge bg-danger">Sale</span> 
</h4> 
<p class="card-text">Stylish smartphone with great camera.</p> 
<p class="price">₹28,000</p> 
<button class="btn btn-primary">Buy Now</button> 
</div> 
</div> 
</div> 
<div class="col-md-4"> 
<div class="card"> 
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e" 
class="card-img-top" 
alt="Headphones"> 
<div class="card-body"> 
<h4 class="card-title"> 
Headphones 
<span class="badge bg-warning text-dark">Popular</span> 
</h4> 
<p class="card-text">Wireless headphones with amazing sound. </p> 
<p class="price">₹4,999</p> 
<button class="btn btn-primary">Buy Now</button> 
</div> 
</div> 
</div> 
</div> 
</div> 
<div class="footer"> 
<p>© 2026 TechZone | Designed with Bootstrap</p> 
</div> 
</body> 
</html>
